name: Deploy Trading Bot

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          
      - name: Syntax Check
        run: |
          python -m py_compile src/runner_live.py
          python -m py_compile src/telegram_bot.py
          python -m py_compile src/rsi_engine.py
          python -m py_compile src/ai_client.py
          python -m py_compile src/second_brain.py
          echo "✅ All Python files compile successfully"
          
      - name: Import Test
        run: |
          python -c "from src.rsi_engine import RSITradingEngine; print('RSI Engine OK')"
          python -c "from src.indicators import calculate_rsi; print('Indicators OK')"
          python -c "from src.second_brain import SecondBrain; print('Second Brain OK')"
          echo "✅ All imports successful"

  notify:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Deployment Status
        run: |
          echo "🚀 Code pushed to GitHub successfully"
          echo "📦 Railway will auto-deploy from main branch"
          echo "🔗 Check Railway dashboard for deployment status"
